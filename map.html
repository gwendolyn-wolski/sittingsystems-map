<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — By Location</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 72px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --full-w: calc(100vw - var(--page-pad-x) * 2);

      --map-w: min(1180px, calc(var(--full-w) * 0.78));
      --map-h: min(68vh, 760px);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .map-section {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      min-height: 1px;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin: 0;
    }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 390px;
      font-size: 10.5px;
      line-height: 1.28;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 8px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .map-section {
      width: var(--full-w);
      max-width: var(--full-w);
      margin-top: 72px;
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
      display: flex;
      justify-content: center;
    }

    .map-frame {
      width: var(--map-w);
      max-width: 100%;
    }

    #map {
      width: 100%;
      height: var(--map-h);
      min-height: 460px;
      background: #f4f4f4;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .leaflet-container {
      background: #f4f4f4;
      border-radius: var(--radius);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .leaflet-container a:focus {
      outline: none;
    }

    .leaflet-control-zoom {
      border: 0 !important;
      box-shadow: none !important;
    }

    .leaflet-control-zoom a {
      border-radius: 10px !important;
      width: 32px !important;
      height: 32px !important;
      line-height: 32px !important;
      box-shadow: 0 6px 20px rgba(0,0,0,.10) !important;
      border: 1px solid rgba(0,0,0,.06) !important;
      background: rgba(255,255,255,.92) !important;
      color: #111 !important;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px !important;
      box-shadow: 0 18px 40px rgba(0,0,0,.14) !important;
      border: 1px solid rgba(0,0,0,.06) !important;
    }

    .leaflet-popup-content {
      margin: 12px !important;
      width: 260px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .leaflet-popup-tip {
      box-shadow: none !important;
    }

    .leaflet-control-attribution {
      font-size: 9px !important;
      opacity: .38;
    }

    .ss-thumb {
      display: block;
      width: 100% !important;
      max-width: 260px !important;
      height: 148px !important;
      object-fit: cover !important;
      border-radius: 12px;
      margin: 0 0 9px 0;
    }

    .ss-title {
      font-size: 13px;
      line-height: 1.18;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin: 0 0 5px 0;
      color: rgba(17,17,17,.9);
    }

    .ss-meta {
      margin-top: 5px;
      font-size: 9.5px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: rgba(17,17,17,.46);
    }

    .ss-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 10.5px;
      line-height: 1.2;
      text-decoration: none;
      border-bottom: 1px solid rgba(17,17,17,.28);
      padding-bottom: 1px;
      color: #111;
    }

    .ss-link:hover {
      border-bottom-color: rgba(17,17,17,.62);
    }

    .marker-cluster,
    .marker-cluster div {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .marker-cluster div {
      width: 30px !important;
      height: 30px !important;
      border-radius: 999px !important;
      background: rgba(17,17,17,.88) !important;
      border: 1px solid rgba(255,255,255,.35) !important;
      box-shadow: 0 10px 18px rgba(0,0,0,.12) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .marker-cluster span {
      color: #fff !important;
      font-weight: 650 !important;
      font-size: 11px !important;
      line-height: 1 !important;
    }

    @media (max-width: 1220px) {
      :root {
        --map-w: min(1080px, calc(var(--full-w) * 0.82));
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --map-w: min(980px, calc(var(--full-w) * 0.86));
      }

      .title {
        font-size: 33px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
        --map-w: 100%;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .map-section {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .map-section {
        margin-top: 44px;
        margin-left: 0;
        justify-content: center;
      }

      .map-frame {
        width: 100%;
      }

      #map {
        min-height: 430px;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 22px;
        --page-pad-bottom: 36px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 12px;
        line-height: 1.36;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .map-section {
        width: 100%;
        margin-top: 30px;
        margin-left: 0;
      }

      .map-frame {
        width: 100%;
      }

      #map {
        height: 58vh;
        min-height: 360px;
        border-radius: 8px;
      }

      .leaflet-popup-content {
        width: 220px;
      }

      .ss-thumb {
        max-width: 220px !important;
        height: 126px !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">By<br>Location</h1>
          <p class="subtitle">Entries organized by city of observation.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section class="map-section">
          <div class="map-frame">
            <div id="map"></div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    const IS_DESKTOP_POINTER = window.matchMedia("(pointer: fine)").matches;

    const map = L.map('map', {
      zoomControl: false,
      scrollWheelZoom: true,
      tap: false
    });

    const worldBounds = L.latLngBounds(
      L.latLng(-85, -180),
      L.latLng(85, 180)
    );

    map.setMaxBounds(worldBounds);
    map.options.maxBoundsViscosity = 1.0;

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    map.on('click', () => map.scrollWheelZoom.enable());
    map.on('mouseout', () => map.scrollWheelZoom.enable());

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap &copy; CARTO",
      subdomains: "abcd",
      maxZoom: 19,
      noWrap: true
    }).addTo(map);

    function toNum(x) {
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    const clusters = L.markerClusterGroup({
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      zoomToBoundsOnClick: true,
      maxClusterRadius: 45,
      animate: true
    });

    fetch('./data.json')
      .then(r => r.json())
      .then(records => {
        const bounds = [];

        records.forEach(rec => {
          const lat = toNum(rec["Latitude"]);
          const lng = toNum(rec["Longitude"]);
          if (lat === null || lng === null) return;

          const url = rec["Readymag_URL"] || '';
          const label = rec["Map_Label"] || rec["Display_ID"] || 'View';
          const context = rec["Context (Primary)"] || '';
          const displayId = (rec["Display_ID"] || "").trim();
          const thumbUrl = displayId ? `images/${displayId}.jpeg` : "";

          const popupHtml = `
            <div class="ss-popup">
              ${thumbUrl ? `<img class="ss-thumb" src="${thumbUrl}" alt="" loading="lazy" onerror="this.remove()">` : ``}
              <div class="ss-title">${label}</div>
              ${url ? `<a class="ss-link" href="${url}" target="_top" rel="noopener">Open object page</a>` : ``}
              ${context ? `<div class="ss-meta">${context}</div>` : ``}
            </div>
          `;

          const marker = L.circleMarker([lat, lng], {
            radius: 5,
            color: "rgba(0,0,0,.18)",
            weight: 4,
            fillColor: "#111",
            fillOpacity: 0.95
          });

          marker.bindPopup(popupHtml, {
            closeButton: true,
            autoClose: true,
            closeOnClick: true
          });

          marker.on('mouseover', () => marker.setStyle({ radius: 7 }));
          marker.on('mouseout', () => marker.setStyle({ radius: 5 }));

          if (IS_DESKTOP_POINTER) {
            marker.on('mouseover', () => marker.openPopup());
            marker.on('mouseout', (e) => {
              const related = e.originalEvent && e.originalEvent.relatedTarget;
              if (related && related.closest && related.closest('.leaflet-popup')) return;
              marker.closePopup();
            });

            marker.on('popupopen', () => {
              const el = marker.getPopup().getElement();
              if (!el) return;
              el.addEventListener('mouseenter', () => marker.openPopup());
              el.addEventListener('mouseleave', () => marker.closePopup());
            });
          }

          clusters.addLayer(marker);
          bounds.push([lat, lng]);
        });

        map.addLayer(clusters);

        if (bounds.length) {
          map.fitBounds(bounds, { padding: [40, 40], maxZoom: 5 });
        } else {
          map.setView([0, 0], 2);
        }

        setTimeout(() => map.invalidateSize(), 120);
      })
      .catch(err => {
        console.error('Failed to load data.json', err);
        map.setView([0, 0], 2);
        setTimeout(() => map.invalidateSize(), 120);
      });

    window.addEventListener('load', () => {
      setTimeout(() => map.invalidateSize(), 120);
    });

    window.addEventListener('resize', () => {
      map.invalidateSize();
    });
  </script>
  <script src="./nav.js"></script>
</body>
</html>
