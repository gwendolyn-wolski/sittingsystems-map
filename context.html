<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — By Context</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;
      --pill-bg: rgba(17,17,17,.03);
      --pill-text: rgba(17,17,17,.54);

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 72px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --full-w: calc(100vw - var(--page-pad-x) * 2);

      --contexts-w: min(1180px, var(--full-w));

      --card-img-w: 246px;
      --card-img-w-narrow: 220px;
      --card-img-w-wide: 270px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .contexts {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      min-height: 1px;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin: 0;
    }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 390px;
      font-size: 10.5px;
      line-height: 1.28;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 8px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .contexts {
      width: var(--full-w);
      max-width: var(--full-w);
      margin-top: 54px;
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .context-item {
      width: 100%;
      border-top: 1px solid var(--line);
    }

    .context-item:last-child {
      border-bottom: 1px solid var(--line);
    }

    .context-toggle {
      width: 100%;
      background: transparent;
      border: 0;
      padding: 15px 0;
      margin: 0;
      cursor: pointer;
      text-align: left;
      display: grid;
      grid-template-columns: 1fr auto 20px;
      gap: 18px;
      align-items: center;
      color: var(--text);
      font: inherit;
    }

    .context-toggle:hover .context-name {
      opacity: .72;
    }

    .context-name {
      font-size: 18px;
      line-height: 1;
      font-weight: 620;
      letter-spacing: -0.03em;
      transition: opacity .15s ease;
    }

    .context-count {
      font-size: 9.5px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 1px;
    }

    .context-icon {
      font-size: 18px;
      line-height: 1;
      text-align: right;
      color: rgba(17,17,17,.54);
      transition: transform .18s ease;
    }

    .context-item.open .context-icon {
      transform: rotate(45deg);
    }

    .context-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .28s ease;
    }

    .context-item.open .context-panel {
      grid-template-rows: 1fr;
    }

    .context-panel-inner {
      overflow: hidden;
    }

    .context-panel-content {
      padding: 4px 0 40px 0;
    }

    .context-note {
      margin: 0 0 20px 0;
      max-width: 420px;
      font-size: 10.5px;
      line-height: 1.32;
      color: var(--muted-soft);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, auto));
      justify-content: space-between;
      align-items: start;
      column-gap: 56px;
      row-gap: 54px;
      width: 100%;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease, opacity .45s ease, filter .45s ease;
      min-width: 0;
      width: var(--card-img-w);
    }

    .card.card-narrow {
      width: var(--card-img-w-narrow);
    }

    .card.card-wide {
      width: var(--card-img-w-wide);
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      background: transparent;
      margin-bottom: 9px;
    }

    .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .meta-block {
      max-width: 92%;
    }

    .card.card-narrow .meta-block {
      max-width: 90%;
    }

    .card.card-wide .meta-block {
      max-width: 94%;
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 14px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -0.015em;
    }

    .object-title {
      margin: 0 0 7px 0;
      font-size: 12.5px;
      line-height: 1.12;
      letter-spacing: -0.012em;
      color: rgba(17,17,17,.9);
      text-wrap: balance;
      max-width: 100%;
    }

    .context {
      margin: 0 0 8px 0;
      font-size: 9.5px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: rgba(17,17,17,.46);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 2px 8px 2px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 9.5px;
      line-height: 1;
      white-space: nowrap;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(14px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal,
      .context-panel,
      .context-icon {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1220px) {
      :root {
        --card-img-w: 230px;
        --card-img-w-narrow: 206px;
        --card-img-w-wide: 252px;
      }

      .card-grid {
        column-gap: 42px;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --card-img-w: 214px;
        --card-img-w-narrow: 194px;
        --card-img-w-wide: 234px;
      }

      .title {
        font-size: 33px;
      }

      .card-grid {
        column-gap: 28px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .contexts {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .contexts {
        margin-top: 40px;
        margin-left: 0;
      }

      .card-grid {
        grid-template-columns: repeat(2, minmax(0, auto));
        justify-content: space-between;
        column-gap: 30px;
        row-gap: 44px;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 22px;
        --page-pad-bottom: 36px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 12px;
        line-height: 1.36;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .contexts {
        width: 100%;
        margin-top: 30px;
        margin-left: 0;
      }

      .context-toggle {
        grid-template-columns: 1fr auto 18px;
        gap: 8px;
        padding: 14px 0;
        align-items: center;
      }

      .context-name {
        font-size: 16px;
      }

      .context-count {
        font-size: 9px;
      }

      .context-panel-content {
        padding: 2px 0 28px 0;
      }

      .context-note {
        font-size: 10.5px;
        line-height: 1.34;
        max-width: 100%;
      }

      .card-grid {
        grid-template-columns: 1fr;
        justify-content: start;
        column-gap: 0;
        row-gap: 28px;
      }

      .card,
      .card.card-narrow,
      .card.card-wide {
        width: 100%;
        max-width: 100%;
      }

      .meta-block,
      .card.card-narrow .meta-block,
      .card.card-wide .meta-block {
        max-width: 100%;
      }

      .id {
        font-size: 14px;
      }

      .object-title {
        font-size: 14px;
        line-height: 1.16;
      }

      .context {
        font-size: 9.5px;
      }

      .tag {
        font-size: 9.5px;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">By<br>Context</h1>
          <p class="subtitle">Seating organized by situational use rather than chronology. Click a category to expand its entries.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="contexts" class="contexts" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const CONTEXT_ORDER = [
      "Waiting",
      "Working",
      "Eating",
      "Social",
      "Resting",
      "Transit",
      "Display",
      "Interaction",
      "Instruction"
    ];

    const CONTEXT_NOTES = {
      "Waiting": "Objects that hold the body in readiness, pause, delay, or compliance.",
      "Working": "Seats used in acts of labor, study, making, or concentrated attention.",
      "Eating": "Objects that stage the body in relation to shared consumption and table ritual.",
      "Social": "Seats that arrange conversation, gathering, companionship, or informal exchange.",
      "Resting": "Forms that support retreat, leisure, recline, or private domestic stillness.",
      "Transit": "Objects linked to passage, temporary pause, circulation, or movement through space.",
      "Display": "Objects functioning as image, proxy, ornament, staging device, or exhibition furniture.",
      "Interaction": "Seats that structure conversation, exchange, performance, or collective encounter.",
      "Instruction": "Seats that discipline posture, direct behavior, or organize the body through pedagogy."
    };

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) return "";
      return `
        <ul class="tags">
          ${tags.filter(Boolean).slice(0, 2).map(tag => `<li class="tag">${escapeHtml(tag)}</li>`).join("")}
        </ul>
      `;
    }

    function getCardScale(item, indexInRow = 0) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const hasManyTags = Array.isArray(item["Context - Secondary"]) && item["Context - Secondary"].length >= 2;
      const isLongTitle = title.length > 44;

      if (displayId === "SS-014" || displayId === "SS-003") return "narrow";
      if (displayId === "SS-009" || displayId === "SS-013") return "wide";

      if (isLongTitle && hasManyTags) return "wide";
      if (title.length < 30 && !hasManyTags && indexInRow === 1) return "narrow";
      return "standard";
    }

    function renderCard(item, indexInRow = 0) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = item["Context - Secondary"] || [];
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);
      const scale = getCardScale(item, indexInRow);

      return `
        <a class="card card-${scale} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          <div class="meta-block">
            <p class="id">${escapeHtml(displayId)}</p>
            <p class="object-title">${escapeHtml(title)}</p>
            <p class="context">${escapeHtml(context)}</p>
            ${renderTags(secondary)}
          </div>
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function setupReveal(scope = document) {
      const items = scope.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    function attachAccordionBehavior() {
      const items = document.querySelectorAll('.context-item');

      items.forEach(item => {
        const button = item.querySelector('.context-toggle');
        const panel = item.querySelector('.context-panel');

        button.addEventListener('click', () => {
          const isOpen = item.classList.contains('open');

          if (isOpen) {
            item.classList.remove('open');
            button.setAttribute('aria-expanded', 'false');
          } else {
            item.classList.add('open');
            button.setAttribute('aria-expanded', 'true');
            setupReveal(panel);
          }

          setTimeout(postSize, 60);
          setTimeout(postSize, 260);
        });
      });
    }

    async function init() {
      const root = document.getElementById('contexts');

      try {
        const res = await fetch('./context.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load context.json (${res.status})`);

        const data = await res.json();
        if (!data || typeof data !== 'object' || Array.isArray(data)) {
          root.innerHTML = '<div class="empty">There was a problem reading the context file.</div>';
          postSize();
          return;
        }

        const orderedKeys = [
          ...CONTEXT_ORDER.filter(key => Array.isArray(data[key]) && data[key].length > 0),
          ...Object.keys(data).filter(
            key => !CONTEXT_ORDER.includes(key) && Array.isArray(data[key]) && data[key].length > 0
          )
        ];

        if (!orderedKeys.length) {
          root.innerHTML = '<div class="empty">No context categories available yet.</div>';
          postSize();
          return;
        }

        const html = orderedKeys.map((key, i) => {
          const cards = [...data[key]].sort(byRecordDescending);
          const panelId = `context-panel-${i}`;

          return `
            <section class="context-item">
              <button class="context-toggle" type="button" aria-expanded="false" aria-controls="${panelId}">
                <div class="context-name">${escapeHtml(key)}</div>
                <div class="context-count">${cards.length} entr${cards.length === 1 ? 'y' : 'ies'}</div>
                <div class="context-icon">+</div>
              </button>

              <div id="${panelId}" class="context-panel">
                <div class="context-panel-inner">
                  <div class="context-panel-content">
                    <p class="context-note">${escapeHtml(CONTEXT_NOTES[key] || "")}</p>
                    <div class="card-grid">
                      ${cards.map((card, idx) => renderCard(card, idx)).join("")}
                    </div>
                  </div>
                </div>
              </div>
            </section>
          `;
        }).join("");

        root.innerHTML = html;
        attachAccordionBehavior();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        root.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>
  <script src="./nav.js"></script>
</body>
</html>
