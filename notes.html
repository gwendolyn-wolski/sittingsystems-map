<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Notes</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 72px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --notes-w: min(760px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .notes-shell {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      min-height: 1px;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin: 0;
    }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 390px;
      font-size: 10.5px;
      line-height: 1.28;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 8px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .notes-shell {
      width: var(--notes-w);
      max-width: 100%;
      margin-top: 46px;
    }

    .notes-intro {
      max-width: 420px;
      margin: 0 0 34px 0;
      font-size: 11px;
      line-height: 1.38;
      color: var(--muted-soft);
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 34px;
    }

    .note-entry {
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .note-date {
      margin: 0 0 8px 0;
      font-size: 9.5px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--muted);
    }

    .note-title {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.14;
      letter-spacing: -0.015em;
      font-weight: 600;
    }

    .note-text {
      margin: 0;
      max-width: 620px;
      font-size: 12px;
      line-height: 1.42;
      color: rgba(17,17,17,.88);
    }

    .placeholder {
      padding-top: 14px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
      }

      .title {
        font-size: 33px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .notes-shell {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 22px;
        --page-pad-bottom: 36px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 12px;
        line-height: 1.36;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .notes-shell {
        width: 100%;
        margin-top: 30px;
      }

      .notes-list {
        gap: 28px;
      }

      .note-title {
        font-size: 14px;
      }

      .note-text {
        font-size: 11.5px;
        line-height: 1.42;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Notes</h1>
          <p class="subtitle">Brief observations drawn from accumulated entries.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

          <div class="notes-list">
            <div class="placeholder">
            </div>

            <!-- Example entry format
            <article class="note-entry">
              <p class="note-date">March 2026</p>
              <h2 class="note-title">Threshold objects</h2>
              <p class="note-text">
                Many entries position seating near edges: storefronts, sidewalks, windows, porches, transitional rooms. Chairs often appear where one condition becomes another.
              </p>
            </article>
            -->
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }
  </script>
  <script src="./nav.js"></script>
</body>
</html>
