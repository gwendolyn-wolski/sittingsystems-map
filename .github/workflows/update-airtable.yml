name: Update site JSON from Airtable

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Airtable data and build JSON files
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: tbl46Hz3VFC0g978N
          MAP_VIEW: Public - Map
          INDEX_VIEW: Public - All
          CONTEXT_VIEW: Public - By Context
          FEATURED_VIEW: Public - Featured
        run: |
          node <<'EOF'
          const fs = require('fs');

          async function fetchView({ baseId, tableId, token, viewName, fields }) {
            let offset = null;
            let all = [];

            do {
              const params = new URLSearchParams();
              params.set('view', viewName);

              for (const f of fields) {
                params.append('fields[]', f);
              }

              if (offset) params.set('offset', offset);

              const url = `https://api.airtable.com/v0/${baseId}/${tableId}?${params.toString()}`;

              const res = await fetch(url, {
                headers: {
                  Authorization: `Bearer ${token}`
                }
              });

              if (!res.ok) {
                const text = await res.text();
                throw new Error(`Airtable error for view "${viewName}": ${res.status} ${text}`);
              }

              const data = await res.json();
              all = all.concat(data.records || []);
              offset = data.offset || null;
            } while (offset);

            return all;
          }

          function cleanRecord(fields) {
            return {
              Record_Number: fields['Record Number'] ?? null,
              Display_ID: fields['Display_ID'] || '',
              Title: fields['Title'] || '',
              Seating_Type: fields['Seating Type'] || '',
              Context_Primary: fields['Context (Primary)'] || '',
              Context_Secondary: fields['Context - Secondary'] || [],
              Origin_System: fields['Origin System'] || [],
              Current_System: fields['Current System (multi-select)'] || [],
              Readymag_URL: fields['Readymag_URL'] || '',
              Map_Label: fields['Map_Label'] || '',
              Latitude: fields['Latitude'] ?? null,
              Longitude: fields['Longitude'] ?? null
            };
          }

          function sortByRecordNumber(a, b) {
            return (a.Record_Number ?? 9999) - (b.Record_Number ?? 9999);
          }

          async function main() {
            const token = process.env.AIRTABLE_TOKEN;
            const baseId = process.env.AIRTABLE_BASE_ID;
            const tableId = process.env.AIRTABLE_TABLE_ID;

            const sharedFields = [
              'Record Number',
              'Display_ID',
              'Title',
              'Seating Type',
              'Context (Primary)',
              'Context - Secondary',
              'Origin System',
              'Current System (multi-select)',
              'Readymag_URL',
              'Map_Label',
              'Latitude',
              'Longitude'
            ];

            // MAP
            const mapRecordsRaw = await fetchView({
              baseId,
              tableId,
              token,
              viewName: process.env.MAP_VIEW,
              fields: sharedFields
            });

            const dataJson = mapRecordsRaw
              .map(r => cleanRecord(r.fields || {}))
              .filter(r =>
                r.Display_ID &&
                typeof r.Latitude === 'number' &&
                typeof r.Longitude === 'number'
              )
              .sort(sortByRecordNumber)
              .map(r => ({
                Display_ID: r.Display_ID,
                Latitude: r.Latitude,
                Longitude: r.Longitude,
                Readymag_URL: r.Readymag_URL,
                Map_Label: r.Map_Label,
                "Context (Primary)": r.Context_Primary
              }));

            fs.writeFileSync('data.json', JSON.stringify(dataJson, null, 2));

            // INDEX
            const indexRecordsRaw = await fetchView({
              baseId,
              tableId,
              token,
              viewName: process.env.INDEX_VIEW,
              fields: sharedFields
            });

            const indexJson = indexRecordsRaw
              .map(r => cleanRecord(r.fields || {}))
              .filter(r => r.Display_ID)
              .sort(sortByRecordNumber)
              .map(r => ({
                Record_Number: r.Record_Number,
                Display_ID: r.Display_ID,
                Title: r.Title,
                Seating_Type: r.Seating_Type,
                "Context (Primary)": r.Context_Primary,
                "Context - Secondary": r.Context_Secondary,
                Readymag_URL: r.Readymag_URL
              }));

            fs.writeFileSync('index.json', JSON.stringify(indexJson, null, 2));

            // CONTEXT
            const contextRecordsRaw = await fetchView({
              baseId,
              tableId,
              token,
              viewName: process.env.CONTEXT_VIEW,
              fields: sharedFields
            });

            const contextOrder = [
              'Waiting',
              'Working',
              'Eating',
              'Social',
              'Resting',
              'Transit',
              'Display',
              'Interaction',
              'Instruction'
            ];

            const grouped = {};

            for (const key of contextOrder) {
              grouped[key] = [];
            }

            contextRecordsRaw
              .map(r => cleanRecord(r.fields || {}))
              .filter(r => r.Display_ID && r.Context_Primary)
              .sort(sortByRecordNumber)
              .forEach(r => {
                if (!grouped[r.Context_Primary]) grouped[r.Context_Primary] = [];
                grouped[r.Context_Primary].push({
                  Record_Number: r.Record_Number,
                  Display_ID: r.Display_ID,
                  Title: r.Title,
                  Seating_Type: r.Seating_Type,
                  "Context (Primary)": r.Context_Primary,
                  "Context - Secondary": r.Context_Secondary,
                  Readymag_URL: r.Readymag_URL
                });
              });

            fs.writeFileSync('context.json', JSON.stringify(grouped, null, 2));

            // FEATURED
            const featuredRecordsRaw = await fetchView({
              baseId,
              tableId,
              token,
              viewName: process.env.FEATURED_VIEW,
              fields: sharedFields
            });

            const featuredJson = featuredRecordsRaw
              .map(r => cleanRecord(r.fields || {}))
              .filter(r => r.Display_ID)
              .sort(sortByRecordNumber)
              .map(r => ({
                Record_Number: r.Record_Number,
                Display_ID: r.Display_ID,
                Title: r.Title,
                Seating_Type: r.Seating_Type,
                "Context (Primary)": r.Context_Primary,
                Readymag_URL: r.Readymag_URL
              }));

            fs.writeFileSync('featured.json', JSON.stringify(featuredJson, null, 2));
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json index.json context.json featured.json
          git diff --cached --quiet || git commit -m "Update site JSON from Airtable"
          git push
