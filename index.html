<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: #f3f3f1;
      --text: #111111;
      --muted: rgba(17,17,17,.58);
      --line: rgba(17,17,17,.10);
      --card-bg: transparent;
      --gap: 28px;
      --radius: 14px;
      --max-width: 1400px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      padding: 28px 28px 56px;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .header {
      margin-bottom: 42px;
    }

    .title {
      margin: 0 0 10px 0;
      font-size: clamp(40px, 6vw, 72px);
      line-height: .95;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .intro {
      margin: 0;
      max-width: 440px;
      font-size: 16px;
      line-height: 1.35;
      color: var(--muted);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin: 10px 0 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .count {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 34px 24px;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      background: var(--card-bg);
      transition: transform .18s ease, opacity .18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(0,0,0,.04);
      margin-bottom: 12px;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .object-title {
      margin: 0 0 6px 0;
      font-size: 14px;
      line-height: 1.25;
      color: var(--text);
    }

    .context {
      margin: 0;
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .empty {
      padding: 40px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .loading {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 800px) {
      .page {
        padding: 22px 18px 40px;
      }

      .meta-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 28px 16px;
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 42px;
      }

      .intro {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <header class="header">
        <h1 class="title">Sitting<br>Systems</h1>
        <p class="intro">A growing index of observed seating objects, organized as an archive of context, posture, and use.</p>
      </header>

      <section class="meta-row">
        <div class="count" id="count">Loading index...</div>
      </section>

      <section id="grid" class="grid" aria-live="polite">
        <div class="loading">Loading objects...</div>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderCard(item) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      return `
        <a class="card" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded')"
              onerror="this.closest('.thumb-wrap').style.display='none';"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
        </a>
      `;
    }

    async function init() {
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');

      try {
        const res = await fetch('./index.json', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error(`Failed to load index.json (${res.status})`);
        }

        const items = await res.json();

        if (!Array.isArray(items) || items.length === 0) {
          count.textContent = '0 public objects';
          grid.innerHTML = '<div class="empty">No objects available yet.</div>';
          return;
        }

        count.textContent = `${items.length} public object${items.length === 1 ? '' : 's'}`;
        grid.innerHTML = items.map(renderCard).join('');
      } catch (err) {
        console.error(err);
        count.textContent = 'Unable to load index';
        grid.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
      }
    }

    init();
  </script>
</body>
</html>
