<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;
      --pill-bg: rgba(17,17,17,.03);
      --pill-text: rgba(17,17,17,.54);

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 80px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --full-w: calc(100vw - var(--page-pad-x) * 2);

      --hero-w: min(560px, calc(var(--full-w) * 0.37));
      --feature-w: 330px;
      --feature-narrow-w: 250px;
      --feature-wide-w: 390px;

      --meta-w: 250px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .archive {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      min-height: 1px;
    }

    .main {
      min-width: 0;
    }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 360px;
      font-size: 10.5px;
      line-height: 1.28;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 8px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .archive {
      width: var(--full-w);
      max-width: var(--full-w);
      margin-top: 78px;
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .archive-block {
      width: 100%;
      margin: 0 0 124px 0;
    }

    .archive-block.tight {
      margin-bottom: 96px;
    }

    .archive-block.loose {
      margin-bottom: 156px;
    }

    .archive-block.hero-block {
      margin-bottom: 138px;
    }

    .hero-row {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .hero-card {
      width: var(--hero-w);
      max-width: 100%;
      display: block;
    }

    .composition-row {
      width: 100%;
      display: flex;
      align-items: flex-start;
    }

    .composition-row.align-left {
      justify-content: flex-start;
      gap: 140px;
    }

    .composition-row.align-right {
      justify-content: flex-end;
      gap: 140px;
    }

    .composition-row.align-between {
      justify-content: space-between;
      gap: 52px;
    }

    .card-group {
      display: flex;
      gap: 58px;
      align-items: flex-start;
    }

    .card-group.compact {
      gap: 44px;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .18s ease, opacity .45s ease, filter .45s ease;
      min-width: 0;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.narrow {
      width: var(--feature-narrow-w);
    }

    .card.standard {
      width: var(--feature-w);
    }

    .card.wide {
      width: var(--feature-wide-w);
    }

    .hero-card .thumb-wrap {
      margin-bottom: 14px;
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      background: transparent;
      margin-bottom: 10px;
    }

    .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .meta-block {
      max-width: var(--meta-w);
    }

    .hero-card .meta-block {
      max-width: 320px;
    }

    .card.narrow .meta-block {
      max-width: 210px;
    }

    .card.standard .meta-block {
      max-width: 238px;
    }

    .card.wide .meta-block {
      max-width: 276px;
    }

    .id {
      margin: 0 0 6px 0;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.012em;
    }

    .hero-card .id {
      font-size: 15px;
      margin-bottom: 5px;
    }

    .object-title {
      margin: 0;
      font-size: 11.8px;
      line-height: 1.08;
      letter-spacing: -0.012em;
      color: rgba(17,17,17,.9);
      text-wrap: balance;
    }

    .hero-card .object-title {
      font-size: 13.2px;
      line-height: 1.1;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .offset-1 { transform: translateY(18px); }
    .offset-2 { transform: translateY(-12px); }
    .offset-3 { transform: translateY(26px); }
    .offset-4 { transform: translateY(-20px); }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal,
      .offset-1,
      .offset-2,
      .offset-3,
      .offset-4 {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1280px) {
      :root {
        --hero-w: min(520px, calc(var(--full-w) * 0.39));
        --feature-w: 300px;
        --feature-narrow-w: 228px;
        --feature-wide-w: 350px;
      }

      .composition-row.align-left,
      .composition-row.align-right {
        gap: 90px;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --hero-w: min(500px, calc(var(--full-w) * 0.42));
        --feature-w: 280px;
        --feature-narrow-w: 214px;
        --feature-wide-w: 320px;
      }

      .title {
        font-size: 33px;
      }

      .archive-block {
        margin-bottom: 108px;
      }

      .archive-block.loose {
        margin-bottom: 132px;
      }

      .composition-row.align-left,
      .composition-row.align-right {
        gap: 62px;
      }

      .card-group {
        gap: 40px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .masthead,
      .archive {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .archive {
        margin-top: 50px;
        margin-left: 0;
      }

      .archive-block,
      .archive-block.tight,
      .archive-block.loose,
      .archive-block.hero-block {
        margin-bottom: 74px;
      }

      .hero-row {
        justify-content: flex-start;
      }

      .hero-card {
        width: min(560px, 100%);
      }

      .composition-row.align-left,
      .composition-row.align-right,
      .composition-row.align-between {
        justify-content: space-between;
        gap: 32px;
      }

      .card-group {
        gap: 28px;
      }

      .card.narrow {
        width: 196px;
      }

      .card.standard {
        width: 236px;
      }

      .card.wide {
        width: 272px;
      }

      .offset-1,
      .offset-2,
      .offset-3,
      .offset-4 {
        transform: none !important;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 18px;
        --page-pad-bottom: 34px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 11.5px;
        line-height: 1.34;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .archive {
        width: 100%;
        margin-top: 34px;
        margin-left: 0;
      }

      .mobile-list {
        display: flex;
        flex-direction: column;
        gap: 46px;
      }

      .mobile-item {
        width: 100%;
      }

      .mobile-item .card {
        width: 100%;
        max-width: 100%;
      }

      .mobile-item .thumb-wrap {
        width: 88%;
        margin: 0 0 12px 0;
      }

      .mobile-item .meta-block {
        max-width: 72%;
      }

      .mobile-item .id {
        margin: 0 0 5px 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .mobile-item .object-title {
        font-size: 11.5px;
        line-height: 1.06;
        letter-spacing: -0.012em;
      }

      .archive-block,
      .archive-block.tight,
      .archive-block.loose,
      .archive-block.hero-block,
      .hero-row,
      .composition-row {
        margin: 0;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Sitting<br>Systems</h1>
          <p class="subtitle">An archive of chairs, seats, and the context in which the body rests.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="archive" class="archive" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function getContextPrimary(item) {
      return (item.Context_Primary || item["Context (Primary)"] || "").trim();
    }

    function getContextSecondary(item) {
      return item.Context_Secondary || item["Context - Secondary"] || [];
    }

    function getSortValue(item) {
      const displayId = String(item.Display_ID || "").trim();
      const match = displayId.match(/(\d+)$/);
      if (match) return Number(match[1]);
      const record = Number(item.Record_Number);
      return Number.isFinite(record) ? record : -1;
    }

    function sortNewestFirst(items) {
      return [...items].sort((a, b) => getSortValue(b) - getSortValue(a));
    }

    function isFeatured(item) {
      const val = String(item?.Featured || "").trim().toLowerCase();
      return val === "yes" || val === "true";
    }

    function featuredRank(item) {
      const id = String(item?.Display_ID || "").trim();
      const preferred = ["SS-017", "SS-013", "SS-001"];
      const index = preferred.indexOf(id);
      return index === -1 ? 999 : index;
    }

    function renderMeta(item, isHero = false) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();

      return `
        <div class="meta-block">
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
        </div>
      `;
    }

    function renderImage(displayId) {
      return `
        <div class="thumb-wrap">
          <img
            class="thumb"
            src="${escapeHtml(imagePathFromDisplayId(displayId))}"
            alt="${escapeHtml(displayId)}"
            loading="lazy"
            onload="this.classList.add('loaded'); postSize();"
            onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
          >
        </div>
      `;
    }

    function renderCard(item, options = {}) {
      const {
        width = "standard",
        extraClass = "",
        hero = false
      } = options;

      const displayId = (item.Display_ID || "").trim();
      const url = (item.Readymag_URL || "").trim();

      return `
        <a class="card ${hero ? "hero-card" : width} reveal ${extraClass}" href="${escapeHtml(url)}" target="_top" rel="noopener">
          ${renderImage(displayId)}
          ${renderMeta(item, hero)}
        </a>
      `;
    }

    function getWidthClass(item, indexInRow = 0) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const secondary = getContextSecondary(item);
      const hasManyTags = Array.isArray(secondary) && secondary.length >= 2;
      const isLong = title.length > 40;

      if (displayId === "SS-018" || displayId === "SS-016" || displayId === "SS-013") return "wide";
      if (displayId === "SS-003" || displayId === "SS-014" || displayId === "SS-002") return "narrow";
      if (isLong && hasManyTags) return "wide";
      if (!isLong && indexInRow === 1) return "narrow";
      return "standard";
    }

    function renderMobileList(items) {
      return `
        <div class="mobile-list">
          ${items.map(item => `
            <div class="mobile-item">
              ${renderCard(item, { width: "standard" })}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderDesktop(items) {
      const featured = sortNewestFirst(items.filter(isFeatured))
        .sort((a, b) => featuredRank(a) - featuredRank(b));

      const featuredIds = new Set(featured.map(item => item.Display_ID));
      const remaining = sortNewestFirst(items.filter(item => !featuredIds.has(item.Display_ID)));

      let html = "";

      if (featured[0]) {
        html += `
          <div class="archive-block hero-block">
            <div class="hero-row">
              ${renderCard(featured[0], { hero: true })}
            </div>
          </div>
        `;
      }

      const patterns = [
        { type: "between-3", offsets: ["offset-1", "", "offset-2"] },
        { type: "left-2", offsets: ["", "offset-3"] },
        { type: "right-2", offsets: ["offset-2", ""] },
        { type: "between-3", offsets: ["", "offset-4", ""] },
        { type: "solo-right", offsets: [""] }
      ];

      if (featured[1]) remaining.unshift(featured[1]);
      if (featured[2]) remaining.splice(Math.min(4, remaining.length), 0, featured[2]);

      let cursor = 0;
      let patternIndex = 0;

      while (cursor < remaining.length) {
        const pattern = patterns[patternIndex % patterns.length];

        if (pattern.type === "between-3") {
          const rowItems = remaining.slice(cursor, cursor + 3);
          if (!rowItems.length) break;

          html += `
            <div class="archive-block ${patternIndex % 2 === 0 ? "loose" : "tight"}">
              <div class="composition-row align-between">
                ${rowItems.map((item, i) =>
                  renderCard(item, {
                    width: getWidthClass(item, i),
                    extraClass: pattern.offsets[i] || ""
                  })
                ).join("")}
              </div>
            </div>
          `;

          cursor += rowItems.length;
        } else if (pattern.type === "left-2" || pattern.type === "right-2") {
          const rowItems = remaining.slice(cursor, cursor + 2);
          if (!rowItems.length) break;

          html += `
            <div class="archive-block tight">
              <div class="composition-row ${pattern.type === "left-2" ? "align-left" : "align-right"}">
                <div class="card-group compact">
                  ${rowItems.map((item, i) =>
                    renderCard(item, {
                      width: getWidthClass(item, i),
                      extraClass: pattern.offsets[i] || ""
                    })
                  ).join("")}
                </div>
              </div>
            </div>
          `;

          cursor += rowItems.length;
        } else if (pattern.type === "solo-right") {
          const item = remaining[cursor];
          if (!item) break;

          html += `
            <div class="archive-block loose">
              <div class="composition-row align-right">
                ${renderCard(item, { width: "standard" })}
              </div>
            </div>
          `;

          cursor += 1;
        }

        patternIndex += 1;
      }

      return html;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const archive = document.getElementById('archive');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' }).catch(() => null)
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);

        const indexItems = await indexRes.json();
        let featuredItems = [];

        if (featuredRes && featuredRes.ok) {
          featuredItems = await featuredRes.json();
        }

        if (!Array.isArray(indexItems) || indexItems.length === 0) {
          archive.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const items = sortNewestFirst(indexItems).map(item => {
          const match = Array.isArray(featuredItems)
            ? featuredItems.find(f => String(f.Display_ID || "").trim() === String(item.Display_ID || "").trim())
            : null;

          if (match && !item.Featured) {
            return { ...item, Featured: match.Featured || "Yes" };
          }
          return item;
        });

        const isMobile = window.innerWidth <= 680;
        archive.innerHTML = isMobile ? renderMobileList(items) : renderDesktop(items);

        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        archive.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>
</body>
</html>
