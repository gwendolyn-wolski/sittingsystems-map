<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;
      --pill-bg: rgba(17,17,17,.03);
      --pill-text: rgba(17,17,17,.54);

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 72px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --full-w: calc(100vw - var(--page-pad-x) * 2);

      --hero-w: min(600px, calc(var(--full-w) * 0.39));
      --hero-2-w: min(560px, calc(var(--full-w) * 0.36));

      --card-img-w: 246px;
      --card-img-w-narrow: 220px;
      --card-img-w-wide: 270px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .archive {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      min-height: 1px;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin: 0;
    }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 430px;
      font-size: 12px;
      line-height: 1.32;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 10px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    /* FULL-WIDTH ARCHIVE BREAKOUT */
    .archive {
      width: var(--full-w);
      max-width: var(--full-w);
      margin-top: 72px;
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .archive-block {
      width: 100%;
      margin: 0 0 138px 0;
    }

    .archive-block.tight {
      margin-bottom: 108px;
    }

    .archive-block.loose {
      margin-bottom: 180px;
    }

    .featured-row {
      width: 100%;
      display: flex;
    }

    .featured-row.center {
      justify-content: center;
    }

    .featured-row.right {
      justify-content: flex-end;
    }

    .featured-card {
      width: var(--hero-w);
      max-width: 100%;
      display: block;
    }

    .featured-card.secondary {
      width: var(--hero-2-w);
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      background: transparent;
      margin-bottom: 9px;
    }

    .featured-card .thumb-wrap {
      margin-bottom: 12px;
    }

    .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .meta-block {
      max-width: 360px;
    }

    .featured-card.secondary .meta-block {
      max-width: 330px;
    }

    .editorial-row {
      width: 100%;
    }

    .editorial-row.two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, auto));
      align-items: start;
    }

    .editorial-row.two.left {
      justify-content: start;
      justify-items: start;
      column-gap: 170px;
    }

    .editorial-row.two.right {
      justify-content: end;
      justify-items: start;
      column-gap: 170px;
    }

    .editorial-row.three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, auto));
      align-items: start;
      width: 100%;
      justify-content: space-between;
    }

    .editorial-row.three.offset-up .card:nth-child(2) {
      transform: translateY(-18px);
    }

    .editorial-row.three.offset-down .card:nth-child(3) {
      transform: translateY(30px);
    }

    .editorial-row.three.stagger-soft .card:nth-child(1) {
      transform: translateY(16px);
    }

    .editorial-row.three.stagger-soft .card:nth-child(2) {
      transform: translateY(-8px);
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .18s ease, opacity .45s ease, filter .45s ease;
      min-width: 0;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    /* CARD WIDTH FOLLOWS IMAGE WIDTH */
    .card.card-narrow {
      width: var(--card-img-w-narrow);
    }

    .card.card-standard {
      width: var(--card-img-w);
    }

    .card.card-wide {
      width: var(--card-img-w-wide);
    }

    .card.card-narrow .thumb,
    .card.card-standard .thumb,
    .card.card-wide .thumb {
      width: 100%;
      max-width: none;
    }

    /* TEXT NARROWER INSIDE IMAGE BOX */
    .card .meta-block {
      max-width: 92%;
    }

    .card.card-narrow .meta-block {
      max-width: 90%;
    }

    .card.card-wide .meta-block {
      max-width: 94%;
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 14px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -0.015em;
    }

    .featured-card .id {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .object-title {
      margin: 0 0 7px 0;
      font-size: 12.5px;
      line-height: 1.12;
      letter-spacing: -0.012em;
      color: rgba(17,17,17,.9);
      max-width: 100%;
      text-wrap: balance;
    }

    .featured-card .object-title {
      font-size: 13.5px;
      line-height: 1.14;
      margin-bottom: 7px;
      max-width: 360px;
    }

    .context {
      margin: 0 0 8px 0;
      font-size: 9.5px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: rgba(17,17,17,.46);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 2px 8px 2px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 9.5px;
      line-height: 1;
      white-space: nowrap;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal,
      .editorial-row.three .card {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1220px) {
      :root {
        --card-img-w: 230px;
        --card-img-w-narrow: 206px;
        --card-img-w-wide: 252px;
        --hero-w: min(565px, calc(var(--full-w) * 0.42));
        --hero-2-w: min(525px, calc(var(--full-w) * 0.39));
      }

      .editorial-row.two.left,
      .editorial-row.two.right {
        column-gap: 120px;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --card-img-w: 214px;
        --card-img-w-narrow: 194px;
        --card-img-w-wide: 234px;
        --hero-w: min(540px, calc(var(--full-w) * 0.44));
        --hero-2-w: min(500px, calc(var(--full-w) * 0.40));
      }

      .title {
        font-size: 33px;
      }

      .archive-block {
        margin-bottom: 120px;
      }

      .archive-block.loose {
        margin-bottom: 152px;
      }

      .editorial-row.two.left,
      .editorial-row.two.right {
        column-gap: 92px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .archive {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .archive {
        margin-top: 44px;
        margin-left: 0;
      }

      .archive-block,
      .archive-block.tight,
      .archive-block.loose {
        margin-bottom: 76px;
      }

      .featured-row,
      .featured-row.center,
      .featured-row.right {
        justify-content: flex-start;
      }

      .featured-card,
      .featured-card.secondary {
        width: min(560px, 100%);
      }

      .editorial-row.two,
      .editorial-row.two.left,
      .editorial-row.two.right,
      .editorial-row.three {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, auto));
        justify-content: space-between;
        column-gap: 40px;
        row-gap: 52px;
      }

      .editorial-row.three .card,
      .editorial-row.three.offset-up .card,
      .editorial-row.three.offset-down .card,
      .editorial-row.three.stagger-soft .card {
        transform: none !important;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 22px;
        --page-pad-bottom: 36px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 12px;
        line-height: 1.36;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .archive {
        width: 100%;
        margin-top: 30px;
        margin-left: 0;
      }

      .archive-block,
      .archive-block.tight,
      .archive-block.loose {
        margin-bottom: 42px;
      }

      .featured-card,
      .featured-card.secondary {
        width: 100%;
        max-width: 100%;
      }

      .featured-card .thumb-wrap {
        margin-bottom: 12px;
      }

      .featured-card .meta-block,
      .featured-card.secondary .meta-block,
      .card .meta-block,
      .card.card-narrow .meta-block,
      .card.card-wide .meta-block {
        max-width: 100%;
      }

      .featured-card .id {
        font-size: 15px;
      }

      .featured-card .object-title {
        font-size: 14px;
        line-height: 1.16;
        max-width: 100%;
      }

      .editorial-row.two,
      .editorial-row.two.left,
      .editorial-row.two.right,
      .editorial-row.three {
        grid-template-columns: 1fr;
        justify-content: start;
        row-gap: 30px;
        column-gap: 0;
      }

      .card.card-narrow,
      .card.card-standard,
      .card.card-wide {
        width: 100%;
        max-width: 100%;
      }

      .card.card-narrow .thumb,
      .card.card-standard .thumb,
      .card.card-wide .thumb {
        max-width: 100%;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Sitting<br>Systems</h1>
          <p class="subtitle">An archive of chairs, seats, and the context in which the body rests.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="archive" class="archive" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags, featured = false) {
      if (!Array.isArray(tags) || tags.length === 0) return "";
      const filtered = tags.filter(Boolean);
      const limited = featured ? filtered : filtered.slice(0, 2);
      if (!limited.length) return "";
      return `
        <ul class="tags">
          ${limited.map(tag => `<li class="tag">${escapeHtml(tag)}</li>`).join("")}
        </ul>
      `;
    }

    function getCardScale(item, indexInRow = 0) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const hasManyTags = Array.isArray(item["Context - Secondary"]) && item["Context - Secondary"].length >= 2;
      const isLongTitle = title.length > 44;

      if (displayId === "SS-014" || displayId === "SS-003") return "narrow";
      if (displayId === "SS-009" || displayId === "SS-013") return "wide";

      if (isLongTitle && hasManyTags) return "wide";
      if (title.length < 30 && !hasManyTags && indexInRow === 1) return "narrow";
      return "standard";
    }

    function renderMeta(item, featured = false) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = item["Context - Secondary"] || [];

      return `
        <div class="meta-block">
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
          ${renderTags(secondary, featured)}
        </div>
      `;
    }

    function renderCard(item, opts = {}) {
      const {
        featured = false,
        featuredClass = "",
        scale = "standard"
      } = opts;

      const displayId = (item.Display_ID || "").trim();
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      if (featured) {
        return `
          <div class="featured-row ${featuredClass}">
            <a class="card featured-card ${featuredClass === "right" ? "secondary" : ""} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
              <div class="thumb-wrap">
                <img
                  class="thumb"
                  src="${escapeHtml(img)}"
                  alt="${escapeHtml(displayId)}"
                  loading="lazy"
                  onload="this.classList.add('loaded'); postSize();"
                  onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
                >
              </div>
              ${renderMeta(item, true)}
            </a>
          </div>
        `;
      }

      return `
        <a class="card card-${scale} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          ${renderMeta(item, false)}
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function buildRow(items, rowIndex) {
      const everyThirdIsTwo = (rowIndex + 1) % 3 === 0;
      const takeCount = everyThirdIsTwo ? 2 : 3;
      const rowItems = items.splice(0, takeCount);
      if (!rowItems.length) return "";

      const rowClassVariants = ["offset-up", "stagger-soft", "offset-down", ""];
      const rowVariant = rowClassVariants[rowIndex % rowClassVariants.length];

      if (rowItems.length === 2) {
        const sideClass = rowIndex % 2 === 0 ? "left" : "right";
        return `
          <div class="archive-block tight">
            <div class="editorial-row two ${sideClass}">
              ${rowItems.map((item, i) => renderCard(item, {
                scale: getCardScale(item, i)
              })).join("")}
            </div>
          </div>
        `;
      }

      return `
        <div class="archive-block ${rowVariant ? "loose" : ""}">
          <div class="editorial-row three ${rowVariant}">
            ${rowItems.map((item, i) => renderCard(item, {
              scale: getCardScale(item, i)
            })).join("")}
          </div>
        </div>
      `;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const archive = document.getElementById('archive');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' })
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);
        if (!featuredRes.ok) throw new Error(`Failed to load featured.json (${featuredRes.status})`);

        const itemsRaw = await indexRes.json();
        const featuredRaw = await featuredRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          archive.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const items = [...itemsRaw].sort(byRecordDescending);
        const featuredItems = Array.isArray(featuredRaw) ? [...featuredRaw].sort(byRecordDescending) : [];
        const featuredIds = new Set(
          featuredItems.map(item => (item.Display_ID || "").trim()).filter(Boolean)
        );

        const itemMap = new Map(items.map(item => [(item.Display_ID || "").trim(), item]));

        const firstFeaturedId = featuredItems[0] ? (featuredItems[0].Display_ID || "").trim() : null;
        const secondFeaturedId = featuredItems[1] ? (featuredItems[1].Display_ID || "").trim() : null;

        let html = "";
        let rowIndex = 0;

        function addRowsFromQueue(queue) {
          while (queue.length) {
            html += buildRow(queue, rowIndex);
            rowIndex += 1;
          }
        }

        if (firstFeaturedId && itemMap.has(firstFeaturedId)) {
          html += `
            <div class="archive-block loose">
              ${renderCard(itemMap.get(firstFeaturedId), {
                featured: true,
                featuredClass: "center"
              })}
            </div>
          `;
        }

        const remaining = items.filter(item => {
          const id = (item.Display_ID || "").trim();
          return id !== firstFeaturedId;
        });

        let queue = [];

        remaining.forEach(item => {
          const id = (item.Display_ID || "").trim();

          if (id === secondFeaturedId) {
            addRowsFromQueue(queue);
            html += `
              <div class="archive-block loose">
                ${renderCard(item, {
                  featured: true,
                  featuredClass: "right"
                })}
              </div>
            `;
            return;
          }

          if (featuredIds.has(id) && id !== secondFeaturedId) {
            addRowsFromQueue(queue);
            html += `
              <div class="archive-block loose">
                ${renderCard(item, {
                  featured: true,
                  featuredClass: "center"
                })}
              </div>
            `;
            return;
          }

          queue.push(item);

          const upcomingRowSize = ((rowIndex + 1) % 3 === 0) ? 2 : 3;
          if (queue.length >= upcomingRowSize) {
            html += buildRow(queue, rowIndex);
            rowIndex += 1;
          }
        });

        addRowsFromQueue(queue);

        archive.innerHTML = html;
        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        archive.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>
