<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.48);
      --muted-soft: rgba(17,17,17,.72);
      --line: #e2e2e2;

      --page-pad-x: 28px;
      --page-pad-top: 58px;
      --page-pad-bottom: 88px;

      --rail-w: 150px;
      --gap: 56px;

      --masthead-w: min(860px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --full-w: calc(100vw - var(--page-pad-x) * 2);

      --card-w: 460px;
      --meta-w: 292px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body { min-height: 100vh; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page,
    .layout,
    .main,
    .archive {
      overflow: visible;
    }

    .page {
      width: 100%;
      padding: var(--page-pad-top) var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail { min-height: 1px; }
    .main { min-width: 0; }

    .masthead {
      width: var(--masthead-w);
      max-width: 100%;
      padding-top: 8px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 14px 0 0 0;
      max-width: 360px;
      font-size: 10.5px;
      line-height: 1.28;
      color: var(--muted-soft);
    }

    .rule {
      margin-top: 8px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .archive {
      width: var(--full-w);
      max-width: var(--full-w);
      margin-top: 76px;
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .archive-row {
      width: 100%;
      display: flex;
      align-items: flex-start;
      margin: 0 0 116px 0;
    }

    .archive-row.center {
      justify-content: center;
      gap: 132px;
    }

    .archive-row.right {
      justify-content: flex-end;
      gap: 132px;
    }

    .archive-row.left {
      justify-content: flex-start;
      gap: 132px;
    }

    .archive-row.between {
      justify-content: space-between;
      gap: 48px;
    }

    .archive-row.solo-center {
      justify-content: center;
    }

    .archive-row.solo-right {
      justify-content: flex-end;
    }

    .card {
      display: block;
      width: var(--card-w);
      min-width: 0;
      transition: transform .18s ease, opacity .45s ease, filter .45s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      background: transparent;
      margin-bottom: 12px;
    }

    .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded { opacity: 1; }
    .card:hover .thumb.loaded { transform: scale(1.01); }

    .meta-block {
      max-width: var(--meta-w);
    }

    .id {
      margin: 0 0 6px 0;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.012em;
    }

    .object-title {
      margin: 0;
      font-size: 11.8px;
      line-height: 1.08;
      letter-spacing: -0.012em;
      color: rgba(17,17,17,.92);
      text-wrap: balance;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1500px) {
      :root {
        --card-w: 420px;
        --meta-w: 270px;
      }

      .archive-row.center,
      .archive-row.right,
      .archive-row.left {
        gap: 92px;
      }
    }

    @media (max-width: 1240px) {
      :root {
        --card-w: 360px;
        --meta-w: 236px;
      }

      .archive-row {
        margin-bottom: 96px;
      }

      .archive-row.center,
      .archive-row.right,
      .archive-row.left {
        gap: 56px;
      }

      .archive-row.between {
        gap: 28px;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --card-w: 320px;
        --meta-w: 216px;
      }

      .title {
        font-size: 33px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --page-pad-top: 48px;
        --card-w: 280px;
        --meta-w: 198px;
      }

      html, body {
        overflow-y: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail { display: none; }

      .masthead,
      .archive {
        width: 100%;
        max-width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .archive {
        margin-top: 52px;
        margin-left: 0;
      }

      .archive-row {
        margin-bottom: 76px;
      }

      .archive-row.center,
      .archive-row.right,
      .archive-row.left {
        gap: 34px;
      }

      .archive-row.between {
        gap: 20px;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-top: 22px;
        --page-pad-bottom: 40px;
      }

      html, body {
        overflow-y: auto;
      }

      .page {
        padding-top: var(--page-pad-top);
      }

      .layout {
        display: block;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 11.5px;
        line-height: 1.34;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .archive {
        width: 100%;
        margin-top: 34px;
        margin-left: 0;
      }

      .mobile-list {
        display: flex;
        flex-direction: column;
        gap: 52px;
      }

      .mobile-item {
        width: 100%;
      }

      .mobile-item .card {
        width: 100%;
        max-width: 100%;
      }

      .mobile-item .thumb-wrap {
        width: 88%;
        margin: 0 0 12px 0;
      }

      .mobile-item .meta-block {
        max-width: 72%;
      }

      .mobile-item .id {
        margin: 0 0 5px 0;
        font-size: 12px;
        line-height: 1;
        font-weight: 700;
      }

      .mobile-item .object-title {
        font-size: 11.5px;
        line-height: 1.06;
      }

      .archive-row {
        margin: 0;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Sitting<br>Systems</h1>
          <p class="subtitle">An archive of chairs, seats, and the context in which the body rests.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="archive" class="archive" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function getSortValue(item) {
      const displayId = String(item.Display_ID || "").trim();
      const match = displayId.match(/(\d+)$/);
      if (match) return Number(match[1]);
      const record = Number(item.Record_Number);
      return Number.isFinite(record) ? record : -1;
    }

    function sortNewestFirst(items) {
      return [...items].sort((a, b) => getSortValue(b) - getSortValue(a));
    }

    function renderCard(item) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const url = (item.Readymag_URL || "").trim();

      return `
        <a class="card reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(imagePathFromDisplayId(displayId))}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          <div class="meta-block">
            <p class="id">${escapeHtml(displayId)}</p>
            <p class="object-title">${escapeHtml(title)}</p>
          </div>
        </a>
      `;
    }

    function renderDesktop(itemMap) {
      const rows = [
        { cls: "center", ids: ["SS-017", "SS-013"] },
        { cls: "solo-right", ids: ["SS-003"] },
        { cls: "solo-left", ids: ["SS-005"] },
        { cls: "center", ids: ["SS-018", "SS-015"] },
        { cls: "left", ids: ["SS-014", "SS-012"] },
        { cls: "solo-center", ids: ["SS-001"] },
        { cls: "solo-center", ids: ["SS-004"] },
        { cls: "between", ids: ["SS-006", "SS-016"] },
        { cls: "left", ids: ["008" },
        { cls: "left", ids: ["SS-010", "SS-002"] },
        { cls: "between", ids: ["SS-007", "SS-009", "SS-011"] }
      ];

      return rows.map(row => {
        const cards = row.ids
          .map(id => itemMap.get(id))
          .filter(Boolean)
          .map(item => renderCard(item))
          .join("");

        if (!cards) return "";
        return `<div class="archive-row ${row.cls}">${cards}</div>`;
      }).join("");
    }

    function renderMobile(items) {
      const ordered = sortNewestFirst(items);
      return `
        <div class="mobile-list">
          ${ordered.map(item => `
            <div class="mobile-item">
              ${renderCard(item)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const archive = document.getElementById('archive');

      try {
        const indexRes = await fetch('./index.json', { cache: 'no-store' });
        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);

        const itemsRaw = await indexRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          archive.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const itemMap = new Map(
          itemsRaw.map(item => [String(item.Display_ID || "").trim(), item])
        );

        const isMobile = window.innerWidth <= 680;
        archive.innerHTML = isMobile
          ? renderMobile(itemsRaw)
          : renderDesktop(itemMap);

        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        archive.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>
</body>
</html>
