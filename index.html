<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --text: #111111;
      --muted: rgba(17,17,17,.56);
      --pill-bg: rgba(17,17,17,.05);
      --pill-text: rgba(17,17,17,.72);
      --max-width: 1280px;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      padding: 0 24px 56px;
      background: transparent;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .flow {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .standard-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      align-items: start;
    }

    .featured-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: start;
      min-height: 20px;
      margin-bottom: 20px;
    }

    .featured-row.center .card.featured {
      grid-column: 3 / span 8;
    }

    .featured-row.right .card.featured {
      grid-column: 8 / span 5;
    }

    .featured-row.left .card.featured {
      grid-column: 1 / span 5;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease, opacity .45s ease, filter .45s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(0,0,0,.03);
      margin-bottom: 12px;
    }

    .card.standard .thumb-wrap {
      aspect-ratio: 1.38 / 1;
      max-width: 100%;
    }

    .card.featured {
      max-width: 760px;
      margin: 0 auto;
    }

    .card.featured .thumb-wrap {
      aspect-ratio: auto;
      max-width: 760px;
      margin: 0 auto 14px auto;
      border-radius: 0;
      overflow: visible;
      background: transparent;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .card.standard .thumb {
      height: 100%;
      object-fit: cover;
    }

    .card.featured .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 17px;
      line-height: 1.14;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .card.featured .id {
      font-size: 18px;
      margin-bottom: 6px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .object-title {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.26;
      color: rgba(17,17,17,.88);
      letter-spacing: -0.01em;
      max-width: 96%;
    }

    .card.featured .object-title {
      font-size: 17px;
      line-height: 1.24;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .context {
      margin: 0 0 10px 0;
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
    }

    .card.featured .context,
    .card.featured .tags {
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 4px 8px 3px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 11px;
      line-height: 1;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1200px) {
      .wrap {
        max-width: 1040px;
      }

      .flow {
        gap: 40px;
      }

      .standard-row {
        gap: 22px;
      }

      .featured-row {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .featured-row.center .card.featured {
        grid-column: 2 / span 6;
      }

      .featured-row.right .card.featured {
        grid-column: 3 / span 5;
      }

      .featured-row.left .card.featured {
        grid-column: 1 / span 5;
      }

      .card.featured,
      .card.featured .thumb-wrap,
      .card.featured .id,
      .card.featured .object-title,
      .card.featured .context,
      .card.featured .tags {
        max-width: 700px;
      }
    }

    @media (max-width: 900px) {
      .standard-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .featured-row {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .featured-row.center .card.featured,
      .featured-row.right .card.featured,
      .featured-row.left .card.featured {
        grid-column: 1 / -1;
      }

      .card.featured,
      .card.featured .thumb-wrap,
      .card.featured .id,
      .card.featured .object-title,
      .card.featured .context,
      .card.featured .tags {
        max-width: 100%;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 0 16px 40px;
      }

      .flow {
        gap: 28px;
      }

      .featured-row {
        margin-bottom: 8px;
      }

      .standard-row {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .featured-row {
        grid-template-columns: 1fr;
      }

      .card.standard .thumb-wrap {
        aspect-ratio: 1.28 / 1;
      }

      .card.featured .thumb-wrap {
        max-width: 100%;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section id="flow" class="flow" aria-live="polite">
        <div class="loading">Loading objects...</div>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) return "";
      return `
        <ul class="tags">
          ${tags
            .filter(Boolean)
            .map(tag => `<li class="tag">${escapeHtml(tag)}</li>`)
            .join("")}
        </ul>
      `;
    }

    function renderCard(item, featured = false) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = item["Context - Secondary"] || [];
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      return `
        <a class="card ${featured ? "featured" : "standard"} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
          ${renderTags(secondary)}
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function buildStandardRow(items, reverseVisual = false) {
      const ordered = reverseVisual ? [...items].reverse() : items;
      return `
        <div class="standard-row">
          ${ordered.map(item => renderCard(item, false)).join("")}
        </div>
      `;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 760) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const flow = document.getElementById('flow');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' })
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);
        if (!featuredRes.ok) throw new Error(`Failed to load featured.json (${featuredRes.status})`);

        const itemsRaw = await indexRes.json();
        const featuredRaw = await featuredRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          flow.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const items = [...itemsRaw].sort(byRecordDescending);
        const featuredItems = Array.isArray(featuredRaw) ? [...featuredRaw].sort(byRecordDescending) : [];
        const featuredIds = new Set(
          featuredItems.map(item => (item.Display_ID || "").trim()).filter(Boolean)
        );

        let html = "";
        const itemMap = new Map(items.map(item => [(item.Display_ID || "").trim(), item]));

        const firstFeaturedId = featuredItems[0] ? (featuredItems[0].Display_ID || "").trim() : null;
        const secondFeaturedId = featuredItems[1] ? (featuredItems[1].Display_ID || "").trim() : null;

        if (firstFeaturedId && itemMap.has(firstFeaturedId)) {
          html += `
            <div class="featured-row center">
              ${renderCard(itemMap.get(firstFeaturedId), true)}
            </div>
          `;
        }

        const remaining = items.filter(item => {
          const id = (item.Display_ID || "").trim();
          return id !== firstFeaturedId;
        });

        let standardBuffer = [];

        function flushStandard(reverseVisual = false) {
          if (standardBuffer.length === 0) return;
          html += buildStandardRow(standardBuffer, reverseVisual);
          standardBuffer = [];
        }

        remaining.forEach(item => {
          const id = (item.Display_ID || "").trim();

          if (id === secondFeaturedId) {
            flushStandard(false);
            html += `
              <div class="featured-row right">
                ${renderCard(item, true)}
              </div>
            `;
            return;
          }

          if (featuredIds.has(id) && id !== secondFeaturedId) {
            flushStandard(false);
            html += `
              <div class="featured-row left">
                ${renderCard(item, true)}
              </div>
            `;
            return;
          }

          standardBuffer.push(item);

          if (standardBuffer.length === 3) {
            const firstId = (standardBuffer[0].Display_ID || "").trim();
            const reverseVisual = Number(firstId.replace("SS-", "")) % 2 === 0;
            flushStandard(reverseVisual);
          }
        });

        flushStandard(false);

        flow.innerHTML = html;
        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 800);
      } catch (err) {
        console.error(err);
        flow.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    init();
  </script>
</body>
</html>
