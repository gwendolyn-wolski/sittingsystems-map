<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: #f3f3f1;
      --text: #111111;
      --muted: rgba(17,17,17,.56);
      --line: rgba(17,17,17,.08);
      --pill-bg: rgba(17,17,17,.05);
      --pill-text: rgba(17,17,17,.72);
      --max-width: 1540px;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      padding: 24px 24px 72px;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .header {
      margin: 0 0 56px 0;
      max-width: 780px;
    }

    .title {
      margin: 0 0 18px 0;
      font-size: clamp(62px, 9vw, 118px);
      line-height: .88;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .intro {
      margin: 0;
      max-width: 640px;
      font-size: 16px;
      line-height: 1.35;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 34px 0;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .count {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .01em;
    }

    .flow {
      display: flex;
      flex-direction: column;
      gap: 44px;
    }

    .standard-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      align-items: start;
    }

    .featured-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      min-height: 40px;
      align-items: start;
    }

    .featured-row.center .card.featured {
      grid-column: 4 / span 6;
    }

    .featured-row.right .card.featured {
      grid-column: 7 / span 6;
    }

    .featured-row.left .card.featured {
      grid-column: 1 / span 6;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(0,0,0,.04);
      margin-bottom: 14px;
    }

    .card.standard .thumb-wrap {
      aspect-ratio: 1.45 / 1;
    }

    .card.featured .thumb-wrap {
      aspect-ratio: 1.12 / 1;
      margin-bottom: 16px;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .card.featured .id {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .object-title {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.28;
      color: rgba(17,17,17,.88);
      letter-spacing: -0.01em;
    }

    .card.featured .object-title {
      font-size: 18px;
      line-height: 1.24;
      max-width: 90%;
    }

    .context {
      margin: 0 0 10px 0;
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 4px 8px 3px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 11px;
      line-height: 1;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 1200px) {
      .standard-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px 22px;
      }

      .featured-row {
        grid-template-columns: repeat(8, minmax(0, 1fr));
      }

      .featured-row.center .card.featured,
      .featured-row.right .card.featured,
      .featured-row.left .card.featured {
        grid-column: 2 / span 6;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px 16px 44px;
      }

      .header {
        margin-bottom: 34px;
      }

      .title {
        font-size: 58px;
      }

      .intro {
        font-size: 15px;
      }

      .flow {
        gap: 30px;
      }

      .standard-row {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .featured-row {
        grid-template-columns: 1fr;
      }

      .featured-row.center .card.featured,
      .featured-row.right .card.featured,
      .featured-row.left .card.featured {
        grid-column: auto;
      }

      .card.standard .thumb-wrap,
      .card.featured .thumb-wrap {
        aspect-ratio: 1.28 / 1;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <header class="header">
        <h1 class="title">Sitting<br>Systems</h1>
        <p class="intro">A growing index of observed seating objects, organized as an archive of context, posture, and use.</p>
      </header>

      <section class="meta-row">
        <div class="count" id="count">Loading index...</div>
      </section>

      <section id="flow" class="flow" aria-live="polite">
        <div class="loading">Loading objects...</div>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) return "";
      return `
        <ul class="tags">
          ${tags
            .filter(Boolean)
            .map(tag => `<li class="tag">${escapeHtml(tag)}</li>`)
            .join("")}
        </ul>
      `;
    }

    function renderCard(item, featured = false) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = item["Context - Secondary"] || [];
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      return `
        <a class="card ${featured ? "featured" : "standard"}" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded')"
              onerror="this.closest('.thumb-wrap').style.display='none';"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
          ${renderTags(secondary)}
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function chunk(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) {
        out.push(arr.slice(i, i + size));
      }
      return out;
    }

    async function init() {
      const flow = document.getElementById('flow');
      const count = document.getElementById('count');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' })
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);
        if (!featuredRes.ok) throw new Error(`Failed to load featured.json (${featuredRes.status})`);

        const itemsRaw = await indexRes.json();
        const featuredRaw = await featuredRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          count.textContent = '0 public objects';
          flow.innerHTML = '<div class="empty">No objects available yet.</div>';
          return;
        }

        const items = [...itemsRaw].sort(byRecordDescending);
        const featuredItems = Array.isArray(featuredRaw) ? [...featuredRaw].sort(byRecordDescending) : [];
        const featuredIds = new Set(featuredItems.map(item => (item.Display_ID || "").trim()).filter(Boolean));

        const standardItems = items.filter(item => !featuredIds.has((item.Display_ID || "").trim()));

        count.textContent = `${items.length} public object${items.length === 1 ? '' : 's'}`;

        let html = "";

        // First featured centered, second right, third left, then repeat.
        const featuredAlignments = ["center", "right", "left"];

        if (featuredItems.length > 0) {
          const firstFeatured = featuredItems[0];
          html += `
            <div class="featured-row ${featuredAlignments[0]}">
              ${renderCard(firstFeatured, true)}
            </div>
          `;
        }

        // Now merge remaining content in descending order.
        // We walk through all items after removing the first featured already placed.
        const placedFeaturedIds = new Set();
        if (featuredItems.length > 0) {
          placedFeaturedIds.add((featuredItems[0].Display_ID || "").trim());
        }

        const remainingItems = items.filter(item => !placedFeaturedIds.has((item.Display_ID || "").trim()));

        let currentStandardRow = [];
        let featuredIndex = 1;

        function flushStandardRow() {
          if (currentStandardRow.length === 0) return;
          html += `
            <div class="standard-row">
              ${currentStandardRow.map(item => renderCard(item, false)).join("")}
            </div>
          `;
          currentStandardRow = [];
        }

        remainingItems.forEach(item => {
          const id = (item.Display_ID || "").trim();
          const isFeatured = featuredIds.has(id);

          if (isFeatured) {
            flushStandardRow();

            const alignment = featuredAlignments[featuredIndex % featuredAlignments.length];
            html += `
              <div class="featured-row ${alignment}">
                ${renderCard(item, true)}
              </div>
            `;
            featuredIndex += 1;
          } else {
            currentStandardRow.push(item);
            if (currentStandardRow.length === 3) {
              flushStandardRow();
            }
          }
        });

        flushStandardRow();

        flow.innerHTML = html;
      } catch (err) {
        console.error(err);
        count.textContent = 'Unable to load index';
        flow.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
      }
    }

    init();
  </script>
</body>
</html>
