<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.52);
      --line: #e2e2e2;
      --pill-bg: rgba(17,17,17,.045);
      --pill-text: rgba(17,17,17,.66);

      --page-pad-x: 28px;
      --page-pad-bottom: 72px;

      --rail-w: 150px;
      --gap: 56px;

      --content-w: min(1080px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --hero-w: min(690px, calc(var(--content-w) * 0.66));
      --hero-2-w: min(620px, calc(var(--content-w) * 0.60));

      --card-img-w: 246px;
      --card-img-w-narrow: 218px;
      --card-img-w-wide: 268px;

      --card-text-w: 238px;
      --card-text-w-narrow: 214px;
      --card-text-w-wide: 258px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body { min-height: 100vh; }

    .page,
    .layout,
    .main,
    .archive {
      overflow: visible;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      padding: 16px var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      padding-top: 40px;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin-bottom: 0;
    }

    .nav {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .nav a { opacity: .94; }

    .nav .sep {
      display: inline-block;
      margin: 0 10px;
      opacity: .7;
    }

    .nav a.active {
      font-weight: 600;
      border-bottom: 1px solid #111;
      padding-bottom: 1px;
    }

    .masthead {
      width: var(--content-w);
      max-width: 100%;
      padding-top: 22px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.045em;
    }

    .subtitle {
      margin: 24px 0 0 0;
      max-width: 470px;
      font-size: 13px;
      line-height: 1.38;
      color: rgba(17,17,17,.80);
    }

    .rule {
      margin-top: 16px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .archive {
      width: 100%;
      max-width: 100%;
      margin-top: 84px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .archive-block {
      width: 100%;
    }

    .archive-block.gap-s { margin-top: 42px; }
    .archive-block.gap-m { margin-top: 84px; }
    .archive-block.gap-l { margin-top: 138px; }
    .archive-block.gap-xl { margin-top: 210px; }

    .featured-row {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .featured-row.right {
      justify-content: flex-end;
    }

    .featured-card {
      display: block;
      width: var(--hero-w);
      max-width: 100%;
    }

    .featured-card.secondary {
      width: var(--hero-2-w);
    }

    .thumb-wrap {
      width: 100%;
      background: transparent;
      overflow: visible;
      margin-bottom: 10px;
    }

    .thumb {
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded { opacity: 1; }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .featured-card .thumb-wrap {
      margin-bottom: 18px;
    }

    .featured-card .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 14px;
      line-height: 1.08;
      font-weight: 625;
      letter-spacing: -0.02em;
    }

    .featured-card .id {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .object-title {
      margin: 0 0 8px 0;
      font-size: 14px;
      line-height: 1.18;
      letter-spacing: -0.016em;
      color: rgba(17,17,17,.92);
    }

    .featured-card .object-title {
      font-size: 17px;
      line-height: 1.18;
      letter-spacing: -0.022em;
      margin-bottom: 8px;
      max-width: 100%;
    }

    .context {
      margin: 0 0 10px 0;
      font-size: 9px;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: .19em;
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 4px 10px 3px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease, opacity .45s ease, filter .45s ease;
      min-width: 0;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.variant-standard {
      max-width: var(--card-text-w);
    }

    .card.variant-narrow {
      max-width: var(--card-text-w-narrow);
    }

    .card.variant-wide {
      max-width: var(--card-text-w-wide);
    }

    .card.variant-standard .thumb {
      width: 100%;
      max-width: var(--card-img-w);
      height: auto;
      object-fit: contain;
    }

    .card.variant-narrow .thumb {
      width: 100%;
      max-width: var(--card-img-w-narrow);
      height: auto;
      object-fit: contain;
    }

    .card.variant-wide .thumb {
      width: 100%;
      max-width: var(--card-img-w-wide);
      height: auto;
      object-fit: contain;
    }

    .card .id,
    .card .object-title,
    .card .context,
    .card .tags {
      width: 100%;
    }

    .editorial-row {
      width: 100%;
    }

    .editorial-row.two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, auto));
      align-items: start;
      column-gap: 170px;
      row-gap: 0;
    }

    .editorial-row.two.left {
      justify-content: start;
    }

    .editorial-row.two.right {
      justify-content: end;
    }

    .editorial-row.two.left .card:nth-child(1) {
      justify-self: start;
      margin-top: 0;
    }

    .editorial-row.two.left .card:nth-child(2) {
      justify-self: start;
      margin-top: 38px;
    }

    .editorial-row.two.right .card:nth-child(1) {
      justify-self: start;
      margin-top: 34px;
    }

    .editorial-row.two.right .card:nth-child(2) {
      justify-self: end;
      margin-top: 0;
    }

    .editorial-row.three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      width: 100%;
      align-items: start;
    }

    .editorial-row.three .card:nth-child(1) {
      justify-self: start;
      margin-top: 0;
    }

    .editorial-row.three .card:nth-child(2) {
      justify-self: center;
      margin-top: 42px;
    }

    .editorial-row.three .card:nth-child(3) {
      justify-self: end;
      margin-top: 0;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal { opacity: 1 !important; }
    }

    @media (max-width: 1180px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --hero-w: min(640px, calc(var(--content-w) * 0.66));
        --hero-2-w: min(570px, calc(var(--content-w) * 0.58));

        --card-img-w: 228px;
        --card-img-w-narrow: 206px;
        --card-img-w-wide: 246px;

        --card-text-w: 222px;
        --card-text-w-narrow: 200px;
        --card-text-w-wide: 238px;
      }

      .editorial-row.two {
        column-gap: 110px;
      }

      .title {
        font-size: 33px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
        --hero-w: min(620px, 100%);
        --hero-2-w: min(560px, 100%);
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        display: none;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .archive {
        width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .archive {
        margin-top: 56px;
      }

      .archive-block.gap-s { margin-top: 30px; }
      .archive-block.gap-m { margin-top: 58px; }
      .archive-block.gap-l { margin-top: 90px; }
      .archive-block.gap-xl { margin-top: 130px; }

      .editorial-row.two {
        column-gap: 64px;
      }

      .editorial-row.three {
        grid-template-columns: repeat(2, 1fr);
        gap: 54px 44px;
      }

      .editorial-row.three .card:nth-child(1) {
        justify-self: start;
        margin-top: 0;
      }

      .editorial-row.three .card:nth-child(2) {
        justify-self: end;
        margin-top: 24px;
      }

      .editorial-row.three .card:nth-child(3) {
        grid-column: 1 / -1;
        justify-self: center;
        margin-top: 0;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-bottom: 34px;
        --hero-w: 100%;
        --hero-2-w: 100%;

        --card-img-w: min(240px, 72vw);
        --card-img-w-narrow: min(225px, 68vw);
        --card-img-w-wide: min(248px, 74vw);

        --card-text-w: min(246px, 74vw);
        --card-text-w-narrow: min(228px, 69vw);
        --card-text-w-wide: min(252px, 76vw);
      }

      .page {
        padding-top: 22px;
      }

      .layout {
        display: block;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .nav {
        font-size: 13px;
        line-height: 1.35;
        white-space: normal;
        max-width: 100%;
      }

      .nav .sep {
        margin: 0 6px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 13px;
        line-height: 1.4;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .archive {
        width: 100%;
        margin-top: 32px;
      }

      .archive-block.gap-s,
      .archive-block.gap-m,
      .archive-block.gap-l,
      .archive-block.gap-xl {
        margin-top: 34px;
      }

      .featured-row,
      .featured-row.right {
        width: 100%;
        display: block;
      }

      .featured-card,
      .featured-card.secondary {
        width: 100%;
        max-width: 100%;
      }

      .featured-card .thumb-wrap {
        margin-bottom: 12px;
      }

      .featured-card .thumb {
        width: 100%;
        height: auto;
      }

      .featured-card .id {
        font-size: 14px;
        margin-bottom: 4px;
      }

      .featured-card .object-title {
        font-size: 15px;
        line-height: 1.28;
        margin-bottom: 6px;
      }

      .context {
        font-size: 10px;
        letter-spacing: .14em;
        margin-bottom: 10px;
      }

      .tag {
        font-size: 11px;
        min-height: 22px;
        padding: 4px 9px 3px;
      }

      .editorial-row.two,
      .editorial-row.three {
        display: grid;
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .editorial-row.two .card,
      .editorial-row.three .card {
        justify-self: start;
        margin-top: 0 !important;
      }

      .card .id {
        font-size: 14px;
      }

      .card .object-title {
        font-size: 15px;
        line-height: 1.28;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail"></aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Sitting<br>Systems</h1>
          <p class="subtitle">An archive of chairs, seats, and the context in which the body rests.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="archive" class="archive" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags, featured = false) {
      if (!Array.isArray(tags) || tags.length === 0) return "";

      const filtered = featured ? tags.filter(Boolean) : tags.filter(Boolean).slice(0, 2);
      if (!filtered.length) return "";

      return `
        <ul class="tags">
          ${filtered.map(tag => `<li class="tag">${escapeHtml(tag)}</li>`).join("")}
        </ul>
      `;
    }

    function cardVariantForRow(rowIndex, position, rowType) {
      if (rowType === 2) {
        if (position === 0) return rowIndex % 2 === 0 ? "wide" : "standard";
        return rowIndex % 2 === 0 ? "narrow" : "wide";
      }

      if (position === 0) return "standard";
      if (position === 1) return "narrow";
      return "wide";
    }

    function renderCard(item, opts = {}) {
      const {
        featured = false,
        featuredClass = "",
        variant = "standard",
        suppressWeakTags = false
      } = opts;

      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = Array.isArray(item["Context - Secondary"]) ? item["Context - Secondary"] : [];
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      const tagsToShow = suppressWeakTags && secondary.length <= 1 ? [] : secondary;

      if (featured) {
        return `
          <div class="featured-row ${featuredClass}">
            <a class="card featured-card ${featuredClass === 'right' ? 'secondary' : ''} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
              <div class="thumb-wrap">
                <img
                  class="thumb"
                  src="${escapeHtml(img)}"
                  alt="${escapeHtml(displayId)}"
                  loading="lazy"
                  onload="this.classList.add('loaded'); postSize();"
                  onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
                >
              </div>
              <p class="id">${escapeHtml(displayId)}</p>
              <p class="object-title">${escapeHtml(title)}</p>
              <p class="context">${escapeHtml(context)}</p>
              ${renderTags(tagsToShow, true)}
            </a>
          </div>
        `;
      }

      return `
        <a class="card variant-${variant} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
          ${renderTags(tagsToShow, false)}
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function buildEditorialRow(items, rowIndex, type = 3, align = "left") {
      if (!items.length) return "";

      const rowClass = type === 2 ? "two" : "three";
      const cardsHtml = items.map((item, idx) => {
        const variant = cardVariantForRow(rowIndex, idx, type);
        const suppressWeakTags = idx !== 0;
        return renderCard(item, { variant, suppressWeakTags });
      }).join("");

      return `<div class="editorial-row ${rowClass} ${align}">${cardsHtml}</div>`;
    }

    function blockWrap(inner, gap = "m") {
      return `<div class="archive-block gap-${gap}">${inner}</div>`;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const archive = document.getElementById('archive');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' })
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);
        if (!featuredRes.ok) throw new Error(`Failed to load featured.json (${featuredRes.status})`);

        const itemsRaw = await indexRes.json();
        const featuredRaw = await featuredRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          archive.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const items = [...itemsRaw].sort(byRecordDescending);
        const featuredItems = Array.isArray(featuredRaw) ? [...featuredRaw].sort(byRecordDescending) : [];

        const featuredIds = new Set(
          featuredItems.map(item => (item.Display_ID || "").trim()).filter(Boolean)
        );

        const itemMap = new Map(items.map(item => [(item.Display_ID || "").trim(), item]));
        const firstFeaturedId = featuredItems[0] ? (featuredItems[0].Display_ID || "").trim() : null;
        const secondFeaturedId = featuredItems[1] ? (featuredItems[1].Display_ID || "").trim() : null;

        let html = "";
        let rowIndex = 0;
        let directionLeft = true;

        if (firstFeaturedId && itemMap.has(firstFeaturedId)) {
          html += blockWrap(
            renderCard(itemMap.get(firstFeaturedId), {
              featured: true,
              featuredClass: "center"
            }),
            "m"
          );
        }

        const remaining = items.filter(item => {
          const id = (item.Display_ID || "").trim();
          return id !== firstFeaturedId;
        });

        let buffer = [];

        function nextPattern() {
          return rowIndex % 3 === 2 ? 2 : 3;
        }

        function nextGap() {
          if (rowIndex % 5 === 0) return "l";
          if (rowIndex % 3 === 0) return "m";
          return "xl";
        }

        function nextAlign(rowType) {
          if (rowType === 2) {
            const a = directionLeft ? "left" : "right";
            directionLeft = !directionLeft;
            return a;
          }
          return "left";
        }

        function flushBuffer(forceAll = false) {
          if (!buffer.length) return;

          while (buffer.length) {
            let pattern = nextPattern();
            let take = pattern;

            if (forceAll && buffer.length < pattern) {
              take = buffer.length;
            } else if (buffer.length < pattern) {
              take = buffer.length >= 2 ? 2 : 1;
            }

            if (!forceAll && buffer.length === 4 && pattern === 3) {
              take = 2;
            }

            const chunk = buffer.splice(0, take);
            const rowType = chunk.length >= 3 ? 3 : 2;
            const align = nextAlign(rowType);
            const gap = nextGap();

            html += blockWrap(
              buildEditorialRow(chunk, rowIndex, rowType, align),
              gap
            );

            rowIndex++;
          }
        }

        remaining.forEach(item => {
          const id = (item.Display_ID || "").trim();

          if (id === secondFeaturedId) {
            flushBuffer(true);

            html += blockWrap(
              renderCard(item, {
                featured: true,
                featuredClass: "right"
              }),
              "xl"
            );
            return;
          }

          if (featuredIds.has(id) && id !== secondFeaturedId) {
            flushBuffer(true);

            html += blockWrap(
              renderCard(item, {
                featured: true,
                featuredClass: "center"
              }),
              "l"
            );
            return;
          }

          buffer.push(item);

          const pattern = nextPattern();
          if (buffer.length >= pattern) {
            flushBuffer();
          }
        });

        flushBuffer(true);

        archive.innerHTML = html;
        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        archive.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>

  <script src="./nav.js"></script>
</body>
