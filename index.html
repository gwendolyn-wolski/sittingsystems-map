<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: rgba(17,17,17,.58);
      --line: #e3e3e3;
      --pill-bg: rgba(17,17,17,.05);
      --pill-text: rgba(17,17,17,.72);

      --page-pad-x: 28px;
      --page-pad-bottom: 56px;

      --rail-w: 150px;
      --gap: 56px;

      --content-w: min(980px, calc(100vw - var(--page-pad-x) * 2 - var(--rail-w) - var(--gap)));
      --hero-w: min(760px, calc(var(--content-w) * 0.72));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      min-height: 100vh;
    }

    .page,
    .layout,
    .main,
    .archive {
      overflow: visible;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      padding: 16px var(--page-pad-x) var(--page-pad-bottom);
      background: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--rail-w) 1fr;
      column-gap: var(--gap);
      align-items: start;
    }

    .rail {
      padding-top: 40px;
    }

    .rail-label {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .main {
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin-bottom: 0;
    }

    .nav {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .nav a {
      opacity: .94;
    }

    .nav .sep {
      display: inline-block;
      margin: 0 10px;
      opacity: .7;
    }

    .nav a.active {
      font-weight: 600;
      border-bottom: 1px solid #111;
      padding-bottom: 1px;
    }

    .masthead {
      width: var(--content-w);
      max-width: 100%;
      padding-top: 22px;
    }

    .title {
      width: 290px;
      margin: 0;
      font-size: 35px;
      line-height: 0.9;
      font-weight: 630;
      letter-spacing: -0.045em;
    }

    .subtitle {
      margin: 22px 0 0 0;
      max-width: 470px;
      font-size: 13px;
      line-height: 1.38;
      color: rgba(17,17,17,.82);
    }

    .rule {
      margin-top: 10px;
      height: 1px;
      background: var(--line);
      width: calc(100vw - var(--page-pad-x) * 2);
      margin-left: calc((var(--rail-w) + var(--gap)) * -1);
    }

    .archive {
      width: var(--content-w);
      max-width: 100%;
      margin-top: 56px;
      display: flex;
      flex-direction: column;
      gap: 110px;
    }

    .featured-row {
      width: 100%;
    }

    .featured-card {
      display: block;
      width: var(--hero-w);
      max-width: 100%;
    }

    .featured-card.left,
    .featured-card.center {
      margin-left: 0;
    }

    .featured-card.right {
      margin-left: auto;
    }

    .thumb-wrap {
      width: 100%;
      background: transparent;
      overflow: visible;
      margin-bottom: 10px;
    }

    .thumb {
      display: block;
      opacity: 0;
      transform: scale(0.985);
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.01);
    }

    .featured-card .thumb-wrap {
      margin-bottom: 14px;
    }

    .featured-card .thumb {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 15px;
      line-height: 1.12;
      font-weight: 620;
      letter-spacing: -0.02em;
    }

    .featured-card .id {
      font-size: 15px;
      font-weight: 620;
      margin-bottom: 6px;
    }

    .object-title {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.22;
      letter-spacing: -0.015em;
      color: rgba(17,17,17,.92);
    }

    .featured-card .object-title {
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      max-width: 100%;
    }

    .context {
      margin: 0 0 12px 0;
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 10px 3px;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease, opacity .45s ease, filter .45s ease;
      min-width: 0;
      max-width: 300px;
    }

    .card .id,
    .card .object-title,
    .card .context,
    .card .tags {
      max-width: 240px;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 150px 150px;
      align-items: start;
    }

    .card-grid > .card:nth-child(3n+1) {
      justify-self: start;
    }

    .card-grid > .card:nth-child(3n+2) {
      justify-self: center;
      margin-top: 34px;
    }

    .card-grid > .card:nth-child(3n) {
      justify-self: end;
      margin-top: 10px;
    }

    .card-grid .thumb-wrap {
      background: transparent;
      aspect-ratio: auto;
      margin-bottom: 10px;
    }

    .card-grid .thumb {
      width: 100%;
      max-width: 240px;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .loading,
    .empty {
      font-size: 14px;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      filter: blur(2px);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .thumb,
      .reveal {
        transition: none !important;
        transform: none !important;
        filter: none !important;
      }

      .reveal {
        opacity: 1 !important;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --rail-w: 120px;
        --gap: 36px;
        --hero-w: min(700px, calc(var(--content-w) * 0.74));
      }

      .card-grid {
        gap: 110px 90px;
      }

      .title {
        font-size: 33px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --page-pad-x: 18px;
      }

      .layout {
        grid-template-columns: 1fr;
        row-gap: 18px;
      }

      .rail {
        padding-top: 0;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 8px;
      }

      .masthead,
      .archive {
        width: 100%;
      }

      .rule {
        width: 100%;
        margin-left: 0;
      }

      .archive {
        margin-top: 40px;
        gap: 72px;
      }

      .card-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 70px 50px;
      }

      .card-grid > .card:nth-child(odd) {
        justify-self: start;
        margin-top: 0;
      }

      .card-grid > .card:nth-child(even) {
        justify-self: end;
        margin-top: 26px;
      }

      .card-grid .thumb {
        max-width: 220px;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page-pad-x: 20px;
        --page-pad-bottom: 34px;
        --hero-w: 100%;
      }

      .page {
        padding-top: 22px;
      }

      .layout {
        display: block;
      }

      .rail {
        padding-top: 0;
        margin-bottom: 18px;
      }

      .rail-label {
        font-size: 11px;
        letter-spacing: .14em;
      }

      .topbar {
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .nav {
        font-size: 13px;
        line-height: 1.35;
        white-space: normal;
        max-width: 100%;
      }

      .nav .sep {
        margin: 0 6px;
      }

      .masthead {
        padding-top: 0;
        width: 100%;
      }

      .title {
        width: 100%;
        max-width: 220px;
        font-size: 28px;
        line-height: 0.92;
        margin: 0 0 14px 0;
      }

      .subtitle {
        margin-top: 0;
        max-width: 100%;
        font-size: 13px;
        line-height: 1.4;
      }

      .rule {
        margin-top: 14px;
        width: 100%;
      }

      .archive {
        width: 100%;
        margin-top: 26px;
        gap: 40px;
      }

      .featured-row,
      .featured-card,
      .featured-card.left,
      .featured-card.right,
      .featured-card.center {
        width: 100%;
        max-width: 100%;
        margin-left: 0;
      }

      .featured-card .thumb-wrap {
        margin-bottom: 12px;
      }

      .featured-card .thumb {
        width: 100%;
        height: auto;
      }

      .featured-card .id {
        font-size: 14px;
        margin-bottom: 4px;
      }

      .featured-card .object-title {
        font-size: 15px;
        line-height: 1.28;
        margin-bottom: 6px;
      }

      .context {
        font-size: 10px;
        letter-spacing: .14em;
        margin-bottom: 10px;
      }

      .tag {
        font-size: 11px;
        min-height: 22px;
        padding: 4px 9px 3px;
      }

      .card-grid {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .card-grid > .card {
        justify-self: start;
        margin-top: 0 !important;
        max-width: 100%;
      }

      .card-grid .thumb {
        max-width: min(220px, 68vw);
      }

      .card .id,
      .card .object-title,
      .card .context,
      .card .tags {
        max-width: min(220px, 68vw);
      }

      .card .id {
        font-size: 14px;
      }

      .card .object-title {
        font-size: 15px;
        line-height: 1.28;
      }

      .reveal {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <aside class="rail">
        <div class="rail-label">Index</div>
      </aside>

      <section class="main">
        <div class="topbar" data-site-nav></div>

        <header class="masthead">
          <h1 class="title">Sitting<br>Systems</h1>
          <p class="subtitle">An archive of chairs, seats, and the context in which the body rests.</p>
          <div class="rule" aria-hidden="true"></div>
        </header>

        <section id="archive" class="archive" aria-live="polite">
          <div class="loading">Loading objects...</div>
        </section>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) return "";
      return `
        <ul class="tags">
          ${tags.filter(Boolean).map(tag => `<li class="tag">${escapeHtml(tag)}</li>`).join("")}
        </ul>
      `;
    }

    function renderCard(item, opts = {}) {
      const { featured = false, alignment = "left" } = opts;

      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const secondary = item["Context - Secondary"] || [];
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      if (featured) {
        return `
          <div class="featured-row">
            <a class="card featured-card ${alignment} reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
              <div class="thumb-wrap">
                <img
                  class="thumb"
                  src="${escapeHtml(img)}"
                  alt="${escapeHtml(displayId)}"
                  loading="lazy"
                  onload="this.classList.add('loaded'); postSize();"
                  onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
                >
              </div>
              <p class="id">${escapeHtml(displayId)}</p>
              <p class="object-title">${escapeHtml(title)}</p>
              <p class="context">${escapeHtml(context)}</p>
              ${renderTags(secondary)}
            </a>
          </div>
        `;
      }

      return `
        <a class="card reveal" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded'); postSize();"
              onerror="this.closest('.thumb-wrap').style.display='none'; postSize();"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
          ${renderTags(secondary)}
        </a>
      `;
    }

    function byRecordDescending(a, b) {
      return (b.Record_Number ?? -9999) - (a.Record_Number ?? -9999);
    }

    function buildGridRow(items) {
      return `
        <div class="card-grid">
          ${items.map(item => renderCard(item)).join("")}
        </div>
      `;
    }

    function setupReveal() {
      const items = document.querySelectorAll('.reveal');

      if (!('IntersectionObserver' in window) || window.innerWidth <= 680) {
        items.forEach(el => el.classList.add('is-visible'));
        postSize();
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            postSize();
          }
        });
      }, {
        threshold: 0.14,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(el => observer.observe(el));
    }

    function postSize() {
      const height = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );

      window.parent.postMessage({
        type: 'sittingsystems:resize',
        height
      }, '*');
    }

    async function init() {
      const archive = document.getElementById('archive');

      try {
        const [indexRes, featuredRes] = await Promise.all([
          fetch('./index.json', { cache: 'no-store' }),
          fetch('./featured.json', { cache: 'no-store' })
        ]);

        if (!indexRes.ok) throw new Error(`Failed to load index.json (${indexRes.status})`);
        if (!featuredRes.ok) throw new Error(`Failed to load featured.json (${featuredRes.status})`);

        const itemsRaw = await indexRes.json();
        const featuredRaw = await featuredRes.json();

        if (!Array.isArray(itemsRaw) || itemsRaw.length === 0) {
          archive.innerHTML = '<div class="empty">No objects available yet.</div>';
          postSize();
          return;
        }

        const items = [...itemsRaw].sort(byRecordDescending);
        const featuredItems = Array.isArray(featuredRaw) ? [...featuredRaw].sort(byRecordDescending) : [];
        const featuredIds = new Set(
          featuredItems.map(item => (item.Display_ID || "").trim()).filter(Boolean)
        );

        const itemMap = new Map(items.map(item => [(item.Display_ID || "").trim(), item]));
        const firstFeaturedId = featuredItems[0] ? (featuredItems[0].Display_ID || "").trim() : null;
        const secondFeaturedId = featuredItems[1] ? (featuredItems[1].Display_ID || "").trim() : null;

        let html = "";

        if (firstFeaturedId && itemMap.has(firstFeaturedId)) {
          html += renderCard(itemMap.get(firstFeaturedId), {
            featured: true,
            alignment: "left"
          });
        }

        const remaining = items.filter(item => {
          const id = (item.Display_ID || "").trim();
          return id !== firstFeaturedId;
        });

        let buffer = [];

        function flushBuffer() {
          if (!buffer.length) return;
          html += buildGridRow(buffer);
          buffer = [];
        }

        remaining.forEach(item => {
          const id = (item.Display_ID || "").trim();

          if (id === secondFeaturedId) {
            flushBuffer();
            html += renderCard(item, {
              featured: true,
              alignment: "right"
            });
            return;
          }

          if (featuredIds.has(id) && id !== secondFeaturedId) {
            flushBuffer();
            html += renderCard(item, {
              featured: true,
              alignment: "left"
            });
            return;
          }

          buffer.push(item);

          if (buffer.length === 3) {
            flushBuffer();
          }
        });

        flushBuffer();

        archive.innerHTML = html;
        setupReveal();

        setTimeout(postSize, 50);
        setTimeout(postSize, 300);
        setTimeout(postSize, 900);
      } catch (err) {
        console.error(err);
        archive.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
        postSize();
      }
    }

    window.addEventListener('load', postSize);
    window.addEventListener('resize', postSize);

    if ('ResizeObserver' in window) {
      const ro = new ResizeObserver(() => postSize());
      ro.observe(document.body);
    }

    init();
  </script>

  <script src="./nav.js"></script>
</body>
</html>
