<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sitting Systems — Index</title>

  <style>
    :root {
      --bg: #f3f3f1;
      --text: #111111;
      --muted: rgba(17,17,17,.56);
      --line: rgba(17,17,17,.08);
      --max-width: 1440px;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      padding: 20px 20px 64px;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .header {
      margin: 0 0 56px 0;
      max-width: 720px;
    }

    .title {
      margin: 0 0 18px 0;
      font-size: clamp(58px, 8vw, 108px);
      line-height: .9;
      letter-spacing: -0.055em;
      font-weight: 700;
    }

    .intro {
      margin: 0;
      max-width: 620px;
      font-size: 18px;
      line-height: 1.35;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 34px 0;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .count {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 52px 30px;
      align-items: start;
    }

    .card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform .16s ease, opacity .16s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb-wrap {
      width: 100%;
      aspect-ratio: 1.18 / 1;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(0,0,0,.04);
      margin-bottom: 14px;
    }

    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .28s ease, transform .28s ease;
    }

    .thumb.loaded {
      opacity: 1;
    }

    .card:hover .thumb.loaded {
      transform: scale(1.015);
    }

    .id {
      margin: 0 0 4px 0;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .object-title {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.28;
      color: rgba(17,17,17,.88);
      letter-spacing: -0.01em;
    }

    .context {
      margin: 0;
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .empty,
    .loading {
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 42px 24px;
      }

      .title {
        font-size: clamp(52px, 8vw, 84px);
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 18px 16px 42px;
      }

      .header {
        margin-bottom: 42px;
      }

      .title {
        font-size: 54px;
      }

      .intro {
        font-size: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .thumb-wrap {
        aspect-ratio: 1.2 / 1;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <header class="header">
        <h1 class="title">Sitting<br>Systems</h1>
        <p class="intro">A growing index of observed seating objects, organized as an archive of context, posture, and use.</p>
      </header>

      <section class="meta-row">
        <div class="count" id="count">Loading index...</div>
      </section>

      <section id="grid" class="grid" aria-live="polite">
        <div class="loading">Loading objects...</div>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function imagePathFromDisplayId(displayId) {
      return displayId ? `images/${displayId}.jpeg` : "";
    }

    function renderCard(item) {
      const displayId = (item.Display_ID || "").trim();
      const title = (item.Title || "").trim();
      const context = (item["Context (Primary)"] || "").trim();
      const url = (item.Readymag_URL || "").trim();
      const img = imagePathFromDisplayId(displayId);

      return `
        <a class="card" href="${escapeHtml(url)}" target="_top" rel="noopener">
          <div class="thumb-wrap">
            <img
              class="thumb"
              src="${escapeHtml(img)}"
              alt="${escapeHtml(displayId)}"
              loading="lazy"
              onload="this.classList.add('loaded')"
              onerror="this.closest('.thumb-wrap').style.display='none';"
            >
          </div>
          <p class="id">${escapeHtml(displayId)}</p>
          <p class="object-title">${escapeHtml(title)}</p>
          <p class="context">${escapeHtml(context)}</p>
        </a>
      `;
    }

    async function init() {
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');

      try {
        const res = await fetch('./index.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load index.json (${res.status})`);

        const items = await res.json();

        if (!Array.isArray(items) || items.length === 0) {
          count.textContent = '0 public objects';
          grid.innerHTML = '<div class="empty">No objects available yet.</div>';
          return;
        }

        count.textContent = `${items.length} public object${items.length === 1 ? '' : 's'}`;
        grid.innerHTML = items.map(renderCard).join('');
      } catch (err) {
        console.error(err);
        count.textContent = 'Unable to load index';
        grid.innerHTML = '<div class="empty">There was a problem loading the archive.</div>';
      }
    }

    init();
  </script>
</body>
</html>

    init();
  </script>
</body>
</html>
